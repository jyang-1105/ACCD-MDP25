<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍦 Bacio di Scelta - Gelato Selector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      overflow: hidden;
      background: #f8fafb;
    }
    
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    
    /* Loading Screen */
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    
    #loading-screen h1 {
      font-size: 72px;
      margin-bottom: 30px;
      animation: bounce 1s infinite;
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    
    #loading-screen h2 {
      color: white;
      font-size: 36px;
      margin-bottom: 40px;
      font-weight: 600;
    }
    
    #progress-container {
      width: 400px;
      height: 12px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    
    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #ffd89b, #19547b);
      width: 0%;
      transition: width 0.3s ease;
      border-radius: 20px;
    }
    
    #progress-text {
      color: white;
      font-size: 24px;
      font-weight: bold;
    }
    
    /* Start Screen - Beautiful gradient */
    #start-screen {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #ffeaa7, #fd79a8);
      z-index: 10000;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      transition: opacity 0.3s ease;
    }
    
    #start-screen h1 {
      font-size: 120px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
      text-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }
    
    #start-screen h2 {
      font-size: 56px;
      color: white;
      margin-bottom: 40px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.2);
      font-weight: 700;
      letter-spacing: 2px;
    }
    
    #start-button {
      padding: 30px 80px;
      font-size: 32px;
      cursor: pointer;
      border-radius: 25px;
      border: 5px solid white;
      background: rgba(255, 255, 255, 0.95);
      color: #fd79a8;
      font-weight: bold;
      box-shadow: 0 15px 50px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    #start-button:hover {
      transform: scale(1.05) translateY(-5px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }
    
    #start-button:active {
      transform: scale(1) translateY(0);
    }
    
    #start-screen p {
      margin-top: 40px;
      color: white;
      font-size: 20px;
      opacity: 0.9;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1);
    }
    
    /* Audio Controls - Mute Button */
    #audio-controls {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
    }
    
    #mute-button {
      padding: 15px 28px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 15px;
      border: 3px solid #ddd;
      background: white;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      font-weight: bold;
      color: #555;
      transition: all 0.3s ease;
      font-family: inherit;
    }
    
    #mute-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.15);
      border-color: #bbb;
    }
    
    #mute-button:active {
      transform: translateY(0);
      box-shadow: 0 3px 15px rgba(0,0,0,0.1);
    }
    
    /* Webcam Preview */
    #webcam-container {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 100;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      border: 4px solid white;
    }
    
    #webcam {
      width: 200px;
      height: 150px;
      object-fit: cover;
      display: block;
      transform: scaleX(-1);
    }
    
    /* Responsive Design */
    @media (max-width: 768px) {
      #loading-screen h1 {
        font-size: 48px;
      }
      
      #loading-screen h2 {
        font-size: 24px;
      }
      
      #progress-container {
        width: 80%;
      }
      
      #start-screen h1 {
        font-size: 80px;
      }
      
      #start-screen h2 {
        font-size: 36px;
      }
      
      #start-button {
        padding: 20px 50px;
        font-size: 24px;
      }
      
      #webcam {
        width: 150px;
        height: 112px;
      }
      
      #mute-button {
        padding: 12px 20px;
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <h1>🍦</h1>
    <h2 style="font-family: Georgia; font-style: italic;">Loading Bacio di Scelta...</h2>
    <div id="progress-container">
      <div id="progress-bar"></div>
    </div>
    <p id="progress-text">0%</p>
  </div>
  
  <!-- Start Screen (for audio permission) -->
  <div id="start-screen">
    <h1>🍦</h1>
    <h2 style="font-family: Georgia; font-style: italic; letter-spacing: 1px;">Bacio di Scelta</h2>
    <p style="font-size: 18px; margin-top: -20px; margin-bottom: 20px; opacity: 0.95;">The Gesture-Based Gelato Selector</p>
    <button id="start-button">🎵 Start</button>
    <p>Click to enable audio and begin!</p>
  </div>
  
  <!-- Main Canvas Container -->
  <div id="canvas-container"></div>
  
  <!-- Webcam Preview -->
  <div id="webcam-container">
    <video id="webcam" autoplay playsinline></video>
  </div>
  
  <!-- Audio Elements - Simple 3-Sound System -->
  <!-- 使用 <source> 标签确保浏览器兼容性 -->
  <audio id="bg-music" preload="auto" loop>
    <source src="assets/sounds/bg-music.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <audio id="start-sound" preload="auto">
    <source src="assets/sounds/start-sound.wav" type="audio/wav">
    <source src="assets/sounds/start-sound.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <audio id="success-sound" preload="auto">
    <source src="assets/sounds/success-sound.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  
  <!-- Audio Controls - Mute Button -->
  <div id="audio-controls">
    <button id="mute-button">🔊 Mute</button>
  </div>
  
  <!-- p5.js Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
  
  <!-- p5.sound Library for Audio -->
  <script src="libraries/p5.sound.min.js"></script>
  
  <!-- ML5.js Library for Hand Tracking -->
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  
  <!-- Your Sketch -->
  <script src="sketch.js"></script>
  
  <script>
    // 添加调试信息
    console.log('🎬 Page loaded, initializing...');
    
    // 检查音频文件是否可访问
    window.addEventListener('load', function() {
      console.log('🔍 Checking audio elements...');
      
      const bgMusic = document.getElementById('bg-music');
      const startSound = document.getElementById('start-sound');
      const successSound = document.getElementById('success-sound');
      
      if (bgMusic) {
        console.log('✅ bg-music element found');
        console.log('   Source:', bgMusic.querySelector('source')?.src || 'no source');
      } else {
        console.error('❌ bg-music element NOT found');
      }
      
      if (startSound) {
        console.log('✅ start-sound element found');
        console.log('   Source:', startSound.querySelector('source')?.src || 'no source');
      } else {
        console.error('❌ start-sound element NOT found');
      }
      
      if (successSound) {
        console.log('✅ success-sound element found');
        console.log('   Source:', successSound.querySelector('source')?.src || 'no source');
      } else {
        console.error('❌ success-sound element NOT found');
      }
      
      // Start p5.js after page loads
      setTimeout(function() {
        if (typeof window.startP5 === 'function') {
          console.log('🚀 Starting p5.js...');
          window.startP5();
        } else {
          console.error('❌ window.startP5 function not found');
        }
      }, 100);
    });
  </script>
</body>
</html>
