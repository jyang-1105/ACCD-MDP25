<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Water Meets Again</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono:wght@400&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#020509;overflow:hidden;cursor:none;}
canvas{display:block;position:fixed;top:0;left:0;}

/* ── CURSOR ─────────────────────────────────────────── */
#cursor{
  position:fixed;width:6px;height:6px;border-radius:50%;
  background:rgba(255,215,155,0.95);pointer-events:none;z-index:200;
  transform:translate(-50%,-50%);
  box-shadow:0 0 10px rgba(255,200,120,0.9),0 0 30px rgba(255,155,70,0.4),0 0 70px rgba(255,120,50,0.12);
  transition:opacity 0.5s;
}

/* ── STAGE TEXT OVERLAY ─────────────────────────────── */
#overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:100;
}

/* Main poem text — center stage */
#poem-main{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(15px,2.2vw,22px);
  font-weight:300;font-style:italic;
  color:rgba(200,220,255,0);
  letter-spacing:0.06em;line-height:2;
  width:60%;
  text-shadow:0 0 60px rgba(120,170,255,0.5);
  transition:color 2s ease,text-shadow 2s ease;
}
#poem-main.visible{color:rgba(200,220,255,0.88);}
#poem-main.warm{
  color:rgba(255,220,170,0.92);
  text-shadow:0 0 60px rgba(255,180,100,0.5);
}
#poem-main.burst{
  color:rgba(255,255,255,0.96);
  text-shadow:0 0 80px rgba(255,255,255,0.6),0 0 160px rgba(200,220,255,0.3);
}

/* Bottom caption */
#poem-sub{
  position:absolute;bottom:52px;left:50%;
  transform:translateX(-50%);
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(11px,1.4vw,14px);
  font-weight:300;font-style:italic;
  color:rgba(150,180,230,0);
  letter-spacing:0.1em;line-height:1.8;
  text-align:center;width:55%;
  transition:color 2s ease;
}
#poem-sub.visible{color:rgba(150,180,230,0.6);}

/* Stage label top-left */
#stage-label{
  position:absolute;top:34px;left:36px;
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:0.35em;
  color:rgba(100,140,200,0.3);
  text-transform:uppercase;
  transition:color 1.5s ease;
}

/* Top-right title */
#title-label{
  position:absolute;top:34px;right:36px;
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:0.28em;
  color:rgba(100,140,200,0.25);
  text-transform:uppercase;white-space:nowrap;
}

/* Hint bottom-center */
#hint{
  position:absolute;bottom:22px;left:50%;
  transform:translateX(-50%);
  font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:0.22em;
  color:rgba(100,140,200,0.22);
  white-space:nowrap;
  transition:opacity 2s ease;
}

/* DEPARTURE burst message — full center takeover */
#burst-msg{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(18px,2.8vw,28px);
  font-weight:300;font-style:italic;
  color:rgba(255,255,255,0);
  letter-spacing:0.08em;line-height:2;
  width:65%;
  pointer-events:none;
  transition:color 1s ease,text-shadow 1s ease;
  text-shadow:0 0 0px rgba(255,255,255,0);
}
#burst-msg.active{
  color:rgba(240,248,255,0.95);
  text-shadow:0 0 100px rgba(180,210,255,0.7),0 0 200px rgba(140,180,255,0.3);
}

</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="overlay">
  <div id="stage-label">— I —&nbsp;&nbsp;arrival</div>
  <div id="title-label">All Water Meets Again</div>
  <div id="poem-main">Winter repeats itself,<br>and those who should meet<br>will meet again.</div>
  <div id="poem-sub"></div>
  <div id="burst-msg"></div>
  <div id="hint">move your cursor through the waters</div>
</div>

<div id="cursor"></div>

<script>
// ═══════════════════════════════════════════════════════
//  CANVAS + STATE
// ═══════════════════════════════════════════════════════
const canvas   = document.getElementById('c');
const ctx      = canvas.getContext('2d');
const cursorEl = document.getElementById('cursor');
const poemMain = document.getElementById('poem-main');
const poemSub  = document.getElementById('poem-sub');
const stageLabel = document.getElementById('stage-label');
const burstMsg   = document.getElementById('burst-msg');
const hintEl     = document.getElementById('hint');

let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize',()=>{resize();initParticles();});

const mouse={x:-999,y:-999,px:-999,py:-999};
let firstMove=false, lastMoveTime=0;
let idleTimer=null;

// Stages: 0=ARRIVAL  1=ENCOUNTER  2=DEPARTURE  3=CARRY
let stage=0;
let warmCount=0;
const WARM_THRESHOLD=90; // particles stained before CARRY triggers

window.addEventListener('mousemove',e=>{
  mouse.px=mouse.x; mouse.py=mouse.y;
  mouse.x=e.clientX; mouse.y=e.clientY;
  cursorEl.style.left=e.clientX+'px';
  cursorEl.style.top=e.clientY+'px';
  lastMoveTime=Date.now();

  if(!firstMove){
    firstMove=true;
    hintEl.style.opacity='0';
    toStage(1);
  }

  // Reset idle if we were in departure
  if(stage===2){ toStage(1); }

  clearTimeout(idleTimer);
  // After 3s stillness → DEPARTURE
  idleTimer=setTimeout(()=>{
    if(stage===1) toStage(2);
  },3000);
});

// ═══════════════════════════════════════════════════════
//  STAGE TRANSITIONS
// ═══════════════════════════════════════════════════════
const STAGE_TEXT={
  0:{
    label:'— I —\u00a0\u00a0arrival',
    main:'Winter repeats itself,<br>and those who should meet<br>will meet again.',
    sub:'',
    mainClass:'visible',
  },
  1:{
    label:'— II —\u00a0\u00a0encounter',
    main:'All the water in the world<br>will meet again.',
    sub:'The Arctic Ocean and the Nile River<br>will blend in the wet clouds.',
    mainClass:'visible',
  },
  2:{
    label:'— III —\u00a0\u00a0departure',
    main:'',
    sub:'',
    mainClass:'',
    burst:'But from then on,<br>we never met again.',
  },
  3:{
    label:'— IV —\u00a0\u00a0carry',
    main:'The part of me who was changed by you<br>will forever accompany me<br>in your place.',
    sub:'Even if we wander,<br>every road will take us home.',
    mainClass:'warm',
  },
};

let burstTimeout=null;

function toStage(n){
  if(stage===n) return;
  stage=n;
  const t=STAGE_TEXT[n];

  // Label
  stageLabel.textContent=t.label;

  // Clear burst
  burstMsg.classList.remove('active');
  burstMsg.innerHTML='';
  clearTimeout(burstTimeout);

  if(n===2){
    // Hide main poem, show burst after brief pause
    poemMain.className=''; poemMain.innerHTML='';
    poemSub.className=''; poemSub.innerHTML='';
    burstTimeout=setTimeout(()=>{
      burstMsg.innerHTML=t.burst;
      burstMsg.classList.add('active');
      // Trigger departure flash on canvas
      triggerDepartureFlash();
      // After 4s of departure, fade burst and return to encounter
      setTimeout(()=>{
        burstMsg.classList.remove('active');
      },4000);
    },600);
  } else {
    poemMain.className=t.mainClass;
    poemMain.innerHTML=t.main;
    poemSub.className=t.sub?'visible':'';
    poemSub.innerHTML=t.sub;
  }
}

// ═══════════════════════════════════════════════════════
//  COLORS
// ═══════════════════════════════════════════════════════
const COLD=[
  {r:105,g:170,b:255},{r:75,g:145,b:235},{r:130,g:195,b:255},{r:60,g:125,b:210}
];
const WARM=[
  {r:255,g:195,b:100},{r:255,g:162,b:78},{r:248,g:218,b:130},{r:255,g:142,b:85},{r:228,g:186,b:118}
];

function lerp(a,b,t){return{r:a.r+(b.r-a.r)*t,g:a.g+(b.g-a.g)*t,b:a.b+(b.b-a.b)*t};}
function rgb(c,a){return`rgba(${c.r|0},${c.g|0},${c.b|0},${a})`;}

// ═══════════════════════════════════════════════════════
//  DEPARTURE FLASH BURST
// ═══════════════════════════════════════════════════════
let flashParticles=[];
let departureFlashActive=false;

function triggerDepartureFlash(){
  departureFlashActive=true;
  // Spawn burst of cold+white particles from center
  const cx=W/2, cy=H/2;
  for(let i=0;i<120;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*5;
    flashParticles.push({
      x:cx+(Math.random()-0.5)*60,
      y:cy+(Math.random()-0.5)*60,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:0,maxLife:60+Math.random()*80,
      size:1+Math.random()*2.5,
      cold:Math.random()>0.3
    });
  }
  setTimeout(()=>{ departureFlashActive=false; },3000);
}

function updateFlash(){
  flashParticles=flashParticles.filter(p=>{
    p.life++;
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.96; p.vy*=0.96;
    if(p.life>=p.maxLife) return false;
    const a=(1-p.life/p.maxLife)*0.75;
    const col=p.cold?`rgba(180,210,255,${a})`:`rgba(255,240,200,${a})`;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.fill();
    return true;
  });
}

// ═══════════════════════════════════════════════════════
//  FLOWING TEXT FRAGMENTS (words drifting in field)
// ═══════════════════════════════════════════════════════
const wordPool=[
  'winter','meet again','regrets','changed',
  'Arctic Ocean','Nile River','clouds','wander',
  'home','forever','sacred','water',
];
let driftWords=[];

class DriftWord{
  constructor(){
    this.word=wordPool[Math.floor(Math.random()*wordPool.length)];
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.vx=(Math.random()-0.5)*0.18;
    this.vy=(Math.random()-0.5)*0.12;
    this.alpha=0;
    this.targetAlpha=0.07+Math.random()*0.1;
    this.life=0;
    this.maxLife=320+Math.random()*400;
    this.size=10+Math.random()*14;
    this.warm=false;
  }
  update(){
    this.life++;
    const fadeIn=Math.min(1,this.life/80);
    const fadeOut=Math.max(0,1-Math.max(0,this.life-this.maxLife*0.7)/(this.maxLife*0.3));
    this.alpha=this.targetAlpha*fadeIn*fadeOut;

    // Cursor attraction
    const dx=mouse.x-this.x, dy=mouse.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150&&firstMove){
      this.warm=true;
      this.vx+=(dx/dist)*0.008;
      this.vy+=(dy/dist)*0.008;
    }
    this.vx*=0.995; this.vy*=0.995;
    this.x+=this.vx; this.y+=this.vy;
    return this.life<this.maxLife&&this.x>-100&&this.x<W+100&&this.y>-100&&this.y<H+100;
  }
  draw(){
    ctx.save();
    ctx.font=`300 italic ${this.size}px 'Cormorant Garamond',serif`;
    ctx.letterSpacing='0.08em';
    const col=this.warm
      ?`rgba(255,200,130,${this.alpha*1.4})`
      :`rgba(140,180,240,${this.alpha})`;
    ctx.fillStyle=col;
    ctx.fillText(this.word,this.x,this.y);
    ctx.restore();
  }
}

function manageDriftWords(){
  if(driftWords.length<12&&Math.random()<0.008){
    driftWords.push(new DriftWord());
  }
  driftWords=driftWords.filter(w=>w.update());
  driftWords.forEach(w=>w.draw());
}

// ═══════════════════════════════════════════════════════
//  PARTICLES
// ═══════════════════════════════════════════════════════
class Particle{
  constructor(){
    this.assignedWarm=WARM[Math.floor(Math.random()*WARM.length)];
    this.warmProgress=0;
    this.spawnRandom();
  }
  spawnRandom(){
    this.x=Math.random()*W; this.y=Math.random()*H;
    this._init();
    this.life=Math.floor(Math.random()*this.maxLife);
  }
  spawnEdge(){
    const e=Math.floor(Math.random()*4);
    if(e===0){this.x=Math.random()*W;this.y=-12;}
    else if(e===1){this.x=W+12;this.y=Math.random()*H;}
    else if(e===2){this.x=Math.random()*W;this.y=H+12;}
    else{this.x=-12;this.y=Math.random()*H;}
    this._init();
  }
  _init(){
    this.baseColor=COLD[Math.floor(Math.random()*COLD.length)];
    this.currentColor=lerp(this.baseColor,this.assignedWarm,this.warmProgress);
    this.size=0.8+Math.random()*2.2;
    this.life=0;
    this.maxLife=200+Math.random()*300;
    this.trail=[];
    const cx=W/2,cy=H/2;
    const dx=cx-this.x,dy=cy-this.y,d=Math.sqrt(dx*dx+dy*dy)||1;
    this.vx=(dx/d)*(0.2+Math.random()*0.6)+(Math.random()-0.5)*0.5;
    this.vy=(dy/d)*(0.2+Math.random()*0.6)+(Math.random()-0.5)*0.5;
  }
  update(){
    this.life++;
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();

    // ── Staining ──────────────────────────────────────
    const dx=mouse.x-this.x,dy=mouse.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const R=stage===1?115:80;
    if(dist<R&&firstMove&&stage!==2){
      const prox=1-dist/R;
      if(this.warmProgress<1){
        const wasCold=this.warmProgress<0.12;
        this.warmProgress=Math.min(1,this.warmProgress+prox*0.025);
        if(wasCold&&this.warmProgress>=0.12){
          warmCount++;
          if(warmCount>=WARM_THRESHOLD&&stage===1) toStage(3);
        }
      }
      this.vx-=(dx/dist)*prox*0.15;
      this.vy-=(dy/dist)*prox*0.15;
    }

    // DEPARTURE — center scatter pulse
    if(stage===2&&departureFlashActive){
      const cx=W/2,cy=H/2;
      const pdx=this.x-cx,pdy=this.y-cy;
      const pd=Math.sqrt(pdx*pdx+pdy*pdy)||1;
      if(pd<180){
        const f=(180-pd)/180;
        this.vx+=(pdx/pd)*f*0.25;
        this.vy+=(pdy/pd)*f*0.25;
      }
    }

    this.currentColor=lerp(this.baseColor,this.assignedWarm,this.warmProgress);

    // Flow field
    const ang=(Math.sin(this.x*0.007+this.life*0.003)+Math.cos(this.y*0.007+this.life*0.002))*Math.PI;
    this.vx+=Math.cos(ang)*0.011;
    this.vy+=Math.sin(ang)*0.011;

    // Center pull
    const cx=W/2,cy=H/2;
    const cdx=cx-this.x,cdy=cy-this.y,cd=Math.sqrt(cdx*cdx+cdy*cdy)||1;
    if(cd>80){this.vx+=cdx/cd*0.007;this.vy+=cdy/cd*0.007;}

    this.vx*=0.983;this.vy*=0.983;
    const spd=Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if(spd>3){this.vx=this.vx/spd*3;this.vy=this.vy/spd*3;}
    this.x+=this.vx;this.y+=this.vy;

    if(this.life>this.maxLife||this.x<-160||this.x>W+160||this.y<-160||this.y>H+160){
      const sw=this.warmProgress,sc={...this.assignedWarm};
      this.spawnEdge();
      this.warmProgress=sw;this.assignedWarm=sc;
      this.currentColor=lerp(this.baseColor,this.assignedWarm,this.warmProgress);
    }
  }
  draw(){
    const fi=Math.min(1,this.life/45);
    const fo=Math.max(0,1-Math.max(0,this.life-this.maxLife*0.72)/(this.maxLife*0.28));
    const alpha=fi*fo;
    const {r,g,b}=this.currentColor;

    // Departure dim
    const stageMult=stage===2?0.45:1;

    for(let i=0;i<this.trail.length;i++){
      const t=i/this.trail.length;
      ctx.beginPath();
      ctx.arc(this.trail[i].x,this.trail[i].y,this.size*t*0.5,0,Math.PI*2);
      ctx.fillStyle=`rgba(${r|0},${g|0},${b|0},${alpha*t*0.22*stageMult})`;
      ctx.fill();
    }
    const glowR=this.size*(1.7+this.warmProgress*2.8);
    const grad=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,glowR);
    grad.addColorStop(0,  `rgba(${r|0},${g|0},${b|0},${alpha*0.9*stageMult})`);
    grad.addColorStop(0.4,`rgba(${r|0},${g|0},${b|0},${alpha*0.28*stageMult})`);
    grad.addColorStop(1,  `rgba(${r|0},${g|0},${b|0},0)`);
    ctx.beginPath();
    ctx.arc(this.x,this.y,glowR,0,Math.PI*2);
    ctx.fillStyle=grad;
    ctx.fill();
  }
}

let particles=[];
function initParticles(){
  const n=Math.min(700,Math.floor(W*H/2600));
  particles=Array.from({length:n},()=>new Particle());
}
initParticles();

// ═══════════════════════════════════════════════════════
//  AMBIENT GLOWS
// ═══════════════════════════════════════════════════════
let ambientWarm=0; // 0→1 as we enter CARRY

function drawAmbient(){
  // Center convergence glow
  const cx=W/2,cy=H/2,r=Math.min(W,H)*0.18;
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);

  // Warm ambient in CARRY stage
  if(stage===3) ambientWarm=Math.min(1,ambientWarm+0.002);
  const coldC=`rgba(105,148,215,${0.06*(1-ambientWarm)})`;
  const warmC=`rgba(255,165,80,${0.05*ambientWarm})`;
  g.addColorStop(0,stage===3?warmC:coldC);
  g.addColorStop(0.6,`rgba(0,0,0,0)`);
  g.addColorStop(1,`rgba(0,0,0,0)`);
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();

  // Cursor aura
  if(firstMove&&stage!==2){
    const ca=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,120);
    ca.addColorStop(0,'rgba(255,195,100,0.06)');
    ca.addColorStop(0.5,'rgba(255,150,65,0.02)');
    ca.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(mouse.x,mouse.y,120,0,Math.PI*2);ctx.fillStyle=ca;ctx.fill();
  }

  // Edge labels
  ctx.save();
  ctx.font='8px "Space Mono",monospace';
  ctx.fillStyle='rgba(130,190,255,0.12)';
  ctx.fillText('ARCTIC OCEAN',24,30);
  ctx.fillStyle='rgba(75,175,155,0.12)';
  ctx.textAlign='right';
  ctx.fillText('NILE RIVER',W-24,H-16);
  ctx.restore();
}

// BG fade color shifts with stage
function drawBG(){
  let bgA=0.19;
  if(stage===2) bgA=0.25; // darker on departure
  if(stage===3) bgA=0.18;
  ctx.fillStyle=`rgba(2,5,9,${bgA})`;
  ctx.fillRect(0,0,W,H);
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render(){
  drawBG();
  drawAmbient();
  manageDriftWords();
  for(const p of particles){p.update();p.draw();}
  updateFlash();
  requestAnimationFrame(render);
}

// Init stage 0
toStage(0);
render();
</script>
</body>
</html>
