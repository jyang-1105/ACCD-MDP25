<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Encryption - Writing System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1816; /* 深邃的底色 */
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            height: 100vh;
            color: #d4c5a9;
        }

        /* Header - 保持隐藏 */
        #header { display: none; }

        #container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #canvas-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #canvas-container { width: 100%; height: 100%; }

        /* 优化后的输入面板：进一步下移，压紧内边距 */
        #input-panel {
            position: fixed;
            bottom: 20px; /* 从 40px 下移到 20px */
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            max-width: 600px; 
            background: rgba(30, 27, 24, 0.6);
            padding: 20px 35px 25px 35px; /* 微调内边距，使其更紧凑 */
            border-radius: 20px;
            border: 1px solid rgba(212, 197, 169, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            z-index: 100;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 提示词：优雅、纤细 */
        #prompt-questions {
            margin-bottom: 15px; /* 缩减下边距 */
            font-size: 20px;
            font-style: italic;
            text-align: center;
            opacity: 0.8;
            letter-spacing: 1px;
            min-height: 30px;
        }

        /* 破除表单感：让输入框融入背景 */
        textarea {
            width: 100%;
            min-height: 40px;
            max-height: 120px;
            padding: 5px 0 10px 0;
            font-family: 'Cormorant Garamond', serif;
            font-size: 18px;
            line-height: 1.6;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(212, 197, 169, 0.2);
            border-radius: 0;
            resize: none;
            color: #f0e6d2;
            transition: all 0.3s;
            text-align: center; 
        }

        textarea:focus {
            outline: none;
            border-bottom: 1px solid rgba(212, 197, 169, 0.8);
            background: transparent;
        }

        textarea::placeholder {
            color: rgba(212, 197, 169, 0.3);
            font-style: italic;
        }

        /* 按钮：极简的等宽字体指令感 */
        button {
            display: block;
            width: 100%;
            background: transparent;
            color: rgba(212, 197, 169, 0.6);
            border: none;
            margin-top: 20px; /* 稍微缩紧与上方输入框的距离 */
            padding: 10px;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
        }

        button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 1px;
            background-color: #d4c5a9;
            transition: width 0.4s ease;
        }

        button:hover { color: #d4c5a9; }
        button:hover::after { width: 40px; }
        button:disabled { opacity: 0.2; cursor: not-allowed; }

        /* Loading 提示 */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(212, 197, 169, 0.8);
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            display: none;
            z-index: 50;
            animation: pulse 1.5s infinite alternate;
        }

        #loading.show { display: block; }

        @keyframes pulse {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            #input-panel {
                width: 95%;
                bottom: 15px; /* 移动端贴得更近一点 */
                padding: 15px 20px 20px 20px;
                border-radius: 15px;
            }
            textarea { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>Emotional Encryption</h1>
        <p>An Experimental Writing System / Archaeological Typography</p>
    </div>

    <div id="container">
        <div id="canvas-panel">
            <div id="canvas-container"></div>
        </div>

        <div id="loading">Decrypting...</div>

        <div id="input-panel">
            <div id="prompt-questions">
                <p id="current-prompt"></p>
            </div>
            
            <textarea id="textInput" placeholder="Type your answer here..."></textarea>
            <button id="analyzeBtn" onclick="analyzeAndRender()">Send</button>
        </div>
    </div>

    <script>
        // === Global Variables ===
        let pg;
        let particles = [];
        let currentEmo = "neutral";
        let currentText = "";
        let canvasParent;
        let emotionIntensity = 0.5; 
        
        // Background color transition system
        let currentBgColor = [26, 24, 22];  
        let targetBgColor = [26, 24, 22];   
        let bgTransitionSpeed = 0.02;       
        
        // === Prompt Questions System ===
        const promptQuestions = [
            "How do you feel right now?",
            "What's on your mind?",
            "Who or what matters most to you?",
            "What emotion fills your heart?",
            "What words have you left unsaid?",
            "What story needs to be told?",
            "Who are you thinking of?",
            "What weighs on your heart?"
        ];
        
        let currentPromptIndex = 0;
        
        function updatePrompt() {
            document.getElementById('current-prompt').textContent = promptQuestions[currentPromptIndex];
        }
        
        function nextPrompt() {
            currentPromptIndex = (currentPromptIndex + 1) % promptQuestions.length;
            updatePrompt();
        }

        // === Emotion Styles ===
        const emotionStyles = {
            neutral: { color: [180, 180, 185], bg: [26, 24, 22], name: "Neutral" },
            repression: { color: [150, 150, 155], bg: [15, 15, 18], name: "Repression / Anxiety" },
            anger: { color: [160, 40, 35], bg: [35, 10, 10], name: "Anger / Rage" },
            joy: { color: [240, 180, 70], bg: [35, 25, 10], name: "Joy / Exuberance" },
            melancholy: { color: [70, 100, 130], bg: [10, 15, 28], name: "Melancholy / Sadness" },
            mystery: { color: [110, 80, 120], bg: [18, 10, 25], name: "Mystery / Unknown" },
            love: { color: [180, 100, 115], color2: [220, 140, 150], bg: [30, 15, 20], name: "Love / Romance" }
        };

        // === Advanced Tone Intensity Analyzer ===
        function calculateIntensity(text) {
            const analysis = { wordCount: 0, punctuation: { exclamation: 0, question: 0, multiPunct: 0 }, typography: { capsWords: 0, capsRatio: 0 }, emotionalDragging: { repeatedChars: 0 }, intensifiers: { count: 0 }, finalIntensity: 0 };
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            analysis.wordCount = words.length;
            
            let wordScore = 0;
            if (analysis.wordCount <= 3) wordScore = analysis.wordCount * 0.03;
            else if (analysis.wordCount <= 10) wordScore = 0.09 + (analysis.wordCount - 3) * 0.02;
            else wordScore = 0.23 + Math.min((analysis.wordCount - 10) * 0.01, 0.17);
            
            analysis.punctuation.exclamation = (text.match(/!/g) || []).length;
            analysis.punctuation.question = (text.match(/\?/g) || []).length;
            const multiPunctPatterns = text.match(/[!?]{2,}/g) || [];
            
            let punctScore = (analysis.punctuation.exclamation * 0.12) + (analysis.punctuation.question * 0.08);
            multiPunctPatterns.forEach(cluster => {
                if (cluster.length >= 3) punctScore += 0.4;
                else if (cluster.length === 2) punctScore += 0.25;
            });
            punctScore = Math.min(punctScore, 0.5);
            
            const capsWords = text.match(/\b[A-Z]{2,}\b/g) || [];
            const totalChars = text.replace(/\s/g, '').length;
            const capsChars = text.replace(/[^A-Z]/g, '').length;
            analysis.typography.capsRatio = totalChars > 0 ? capsChars / totalChars : 0;
            
            let typoScore = capsWords.length * 0.15;
            if (analysis.typography.capsRatio > 0.3) typoScore += 0.25;
            else if (analysis.typography.capsRatio > 0.5) typoScore += 0.4;
            typoScore = Math.min(typoScore, 0.45);
            
            const repeatedPatterns = text.match(/([a-z])\1{2,}/gi) || [];
            let dragScore = 0;
            repeatedPatterns.forEach(pattern => {
                if (pattern.length >= 5) dragScore += 0.3;
                else if (pattern.length >= 3) dragScore += 0.2;
                else dragScore += 0.1;
            });
            dragScore = Math.min(dragScore, 0.4);
            
            const extremeMatches = text.match(/\b(extremely|absolutely|completely|totally|utterly|entirely)\b/gi) || [];
            const highMatches = text.match(/\b(very|really|so|super|incredibly|amazingly|terribly)\b/gi) || [];
            let intensifierScore = (extremeMatches.length * 0.25) + (highMatches.length * 0.15);
            intensifierScore = Math.min(intensifierScore, 0.45);
            
            const totalScore = wordScore + punctScore + typoScore + dragScore + intensifierScore;
            let finalIntensity = 0.15 + (totalScore * 0.85);
            finalIntensity = Math.pow(finalIntensity, 0.9);
            finalIntensity = Math.max(0.15, Math.min(1.0, finalIntensity));
            
            return finalIntensity;
        }

        // === P5.js Setup ===
        function setup() {
            canvasParent = document.getElementById('canvas-container');
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent(canvasParent);
            pixelDensity(1);
            
            pg = createGraphics(width, height);
            currentBgColor = [...emotionStyles['neutral'].bg]; 
            
            generateParticles("WRITE\nSOMETHING");
            updatePrompt();
        }

        // === P5.js Draw Loop ===
        function draw() {
            let style = emotionStyles[currentEmo];
            let t = millis() * 0.001; 
            
            // === SMOOTH BACKGROUND TRANSITION ===
            targetBgColor = style.bg;
            currentBgColor[0] = lerp(currentBgColor[0], targetBgColor[0], bgTransitionSpeed);
            currentBgColor[1] = lerp(currentBgColor[1], targetBgColor[1], bgTransitionSpeed);
            currentBgColor[2] = lerp(currentBgColor[2], targetBgColor[2], bgTransitionSpeed);
            
            background(currentBgColor[0], currentBgColor[1], currentBgColor[2]);
            
            // === Emotion-Specific Background Effects ===
            if (currentEmo === 'anger') {
                let flicker = sin(t * 0.5) * 0.5 + 0.5;
                fill(120, 20, 20, flicker * 15);
                rect(0, 0, width, height);
                if (random(1) < 0.01) {
                    fill(150, 30, 30, 30);
                    rect(0, 0, width, height);
                }
            }
            else if (currentEmo === 'love') {
                let pulse = sin(t * 0.8) * 0.5 + 0.5;
                let gradient = drawingContext.createRadialGradient(
                    width/2, height/2, 0, width/2, height/2, width * 0.8
                );
                gradient.addColorStop(0, `rgba(200, 130, 140, ${pulse * 0.08})`);
                gradient.addColorStop(1, 'rgba(42, 37, 32, 0)');
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            else if (currentEmo === 'melancholy') {
                for (let i = 0; i < 50; i++) {
                    let x = random(width);
                    let y = random(height);
                    fill(80, 100, 120, random(5, 15));
                    noStroke();
                    ellipse(x, y, random(1, 3));
                }
                let gradient = drawingContext.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, 'rgba(42, 37, 32, 0)');
                gradient.addColorStop(1, 'rgba(60, 75, 90, 0.15)');
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            else if (currentEmo === 'repression') {
                for (let i = 0; i < 100; i++) {
                    stroke(200, 200, 200, random(3, 10));
                    point(random(width), random(height));
                }
                let vignette = sin(t * 0.6) * 0.3 + 0.7;
                let gradient = drawingContext.createRadialGradient(
                    width/2, height/2, width * 0.3, width/2, height/2, width * 0.8
                );
                gradient.addColorStop(0, 'rgba(42, 37, 32, 0)');
                gradient.addColorStop(1, `rgba(20, 20, 22, ${vignette * 0.3})`);
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            else if (currentEmo === 'mystery') {
                fill(sin(t * 0.4) * 20 + 90, 70, 100, 8);
                rect(0, 0, width, height);
                if (frameCount % 2 === 0) {
                    stroke(110, 90, 120, 15);
                    strokeWeight(1);
                    for (let y = 0; y < height; y += random(3, 8)) {
                        line(0, y, width, y);
                    }
                }
            }

            for (let i = 0; i < particles.length; i++) {
                particles[i].update(currentEmo);
                particles[i].draw(currentEmo);
            }
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
            pg = createGraphics(width, height);
            if (currentText) generateParticles(currentText);
        }

        // === Analyze Text (纯本地运算版本) ===
        function analyzeAndRender() {
            const textInput = document.getElementById('textInput').value.trim();
            
            if (!textInput) {
                alert('Please enter some text first.');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('analyzeBtn').disabled = true;

            setTimeout(() => {
                try {
                    const emotion = detectEmotion(textInput);
                    emotionIntensity = calculateIntensity(textInput);
                    
                    currentEmo = emotion;
                    currentText = textInput;
                    
                    // 已移除更新和显示 emotion-info 的相关代码
                    
                    generateParticles(formatText(textInput));
                    nextPrompt();
                    document.getElementById('textInput').value = '';
                    
                } catch (error) {
                    console.error('Analysis error:', error);
                } finally {
                    document.getElementById('loading').classList.remove('show');
                    document.getElementById('analyzeBtn').disabled = false;
                }
            }, 600); 
        }

        // === 超级扩充版：本地情绪词库检测 ===
        function detectEmotion(text) {
            const cleanText = text.toLowerCase().replace(/['"’]/g, '');
            
            const dictionary = {
                repression: [
                    'anxious', 'anxiety', 'worry', 'worried', 'nervous', 'stress', 'pressure', 
                    'overwhelm', 'trapped', 'stuck', 'fear', 'scared', 'terrify', 'dread', 'panic',
                    'cant breathe', 'cannot breathe', 'suffocat', 'cant sleep', 'cannot sleep', 
                    'insomnia', 'awake at night', 'overthink', 'racing thought', 'on edge', 
                    'too much', 'cant handle', 'losing it', 'break down', 'paralyz', 'heavy chest', 
                    'bottled up', 'hide', 'hiding', 'restless', 'burnout'
                ],
                melancholy: [
                    'sad', 'cry', 'tears', 'weep', 'grief', 'sorrow', 'heartbreak', 'miss you', 
                    'lost', 'gone', 'empty', 'hollow', 'lonely', 'alone', 'abandon', 'pain', 
                    'hurt', 'ache', 'suffer', 'numb', 'exhausted', 'drained', 'broken', 'shatter', 
                    'hopeless', 'pointless', 'meaningless', 'worthless', 'tired of', 'not okay', 
                    'fall apart', 'cant go on', 'giving up', 'depress', 'darkness', 'despair'
                ],
                anger: [
                    'angry', 'anger', 'hate', 'furious', 'rage', 'mad', 'outrag', 'frustrat', 
                    'annoy', 'irritat', 'livid', 'unfair', 'unacceptable', 'ridiculous', 'betray', 
                    'sick of', 'fed up', 'had enough', 'scream', 'explode', 'damn', 'pissed', 
                    'bullshit', 'destroy', 'revenge', 'resent', 'boiling', 'punch', 'shut up'
                ],
                joy: [
                    'happy', 'happiness', 'joy', 'excit', 'thrill', 'wonder', 'amaz', 'fantastic', 
                    'great', 'celebrat', 'proud', 'achiev', 'dream', 'finally', 'made it', 
                    'grateful', 'thankful', 'blessed', 'laugh', 'smile', 'relief', 'perfect', 
                    'beautiful', 'sunshine', 'alive', 'win', 'won', 'delight'
                ],
                love: [
                    'love', 'adore', 'cherish', 'darling', 'sweetheart', 'kiss', 'embrace', 
                    'romance', 'affection', 'forever', 'soulmate', 'think of you', 'think about you', 
                    'only you', 'need you', 'want you', 'my heart', 'comfort', 'you mean', 'safe', 
                    'together', 'hold me', 'butterfly', 'warm'
                ],
                mystery: [
                    'strange', 'mysterious', 'unknown', 'curious', 'weird', 'uncanny', 'secret', 
                    'hidden', 'something feels', 'doesnt feel right', 'cant explain', 'not sure what', 
                    'surreal', 'disorient', 'confus', 'foggy', 'blur', 'ghost', 'haunt', 'deja vu', 
                    'glitch', 'dreaming', 'unreal'
                ]
            };

            let scores = { melancholy: 0, repression: 0, anger: 0, joy: 0, love: 0, mystery: 0 };
            let matchedSomething = false;

            for (let emotion in dictionary) {
                dictionary[emotion].forEach(word => {
                    if (cleanText.includes(word)) {
                        scores[emotion] += 1;
                        if (word.includes(' ')) scores[emotion] += 2; 
                        matchedSomething = true;
                    }
                });
            }

            if (!matchedSomething) return 'neutral';

            let maxEmotion = 'neutral';
            let maxScore = 0;
            for (let emotion in scores) {
                if (scores[emotion] > maxScore) {
                    maxScore = scores[emotion];
                    maxEmotion = emotion;
                }
            }
            return maxEmotion;
        }

        // === Format Text for Display ===
        function formatText(text) {
            text = text.trim();
            let words = text.split(' ');
            let lines = [];
            let currentLine = '';
            
            let totalChars = text.length;
            let charsPerLine;
            
            if (currentEmo === 'love') {
                if (totalChars < 30) charsPerLine = 50;
                else if (totalChars < 80) charsPerLine = 80; 
                else if (totalChars < 150) charsPerLine = 90; 
                else if (totalChars < 250) charsPerLine = 100;
                else charsPerLine = 110;
            } else {
                if (totalChars < 50) charsPerLine = 30;
                else if (totalChars < 150) charsPerLine = 40;
                else if (totalChars < 300) charsPerLine = 50;
                else charsPerLine = 60;
            }
            
            for (let i = 0; i < words.length; i++) {
                let testLine = currentLine + words[i] + ' ';
                if (testLine.length > charsPerLine && currentLine.length > 0) {
                    lines.push(currentLine.trim());
                    currentLine = words[i] + ' ';
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine.trim().length > 0) lines.push(currentLine.trim());
            
            let maxLines = currentEmo === 'love' ? 6 : 8; 
            if (lines.length > maxLines) {
                lines = lines.slice(0, maxLines);
                lines[maxLines - 1] += '...';
            }
            return lines.join('\n');
        }

        // === Generate Particles ===
        function generateParticles(txt) {
            particles = [];
            pg.clear();
            pg.background(0, 0);
            pg.fill(255);
            pg.noStroke();
            pg.textAlign(CENTER, CENTER);
            
            let lines = txt.split('\n');
            let lineCount = lines.length;
            let longestLine = Math.max(...lines.map(l => l.length));
            let totalChars = txt.length; 
            let fontSize;
            
            if (currentEmo === 'love') {
                if (lineCount <= 1) fontSize = min(width / longestLine * 1.2, height * 0.16);
                else if (lineCount <= 2) fontSize = min(width / longestLine * 1.2, height * 0.13);
                else if (lineCount <= 3) fontSize = min(width / longestLine * 1.2, height * 0.11);
                else if (lineCount <= 4) fontSize = min(width / longestLine * 1.3, height * 0.09);
                else if (lineCount <= 5) fontSize = min(width / longestLine * 1.4, height * 0.08);
                else fontSize = min(width / longestLine * 1.5, height * 0.07);
                if (totalChars > 300) fontSize *= 0.95;
                else if (totalChars > 200) fontSize *= 0.97;
                fontSize = constrain(fontSize, 30, 150); 
            } else {
                if (lineCount <= 2 && longestLine < 30) fontSize = min(width, height) * 0.12;
                else if (lineCount <= 3 && longestLine < 50) fontSize = min(width, height) * 0.08;
                else if (lineCount <= 5 && longestLine < 70) fontSize = min(width, height) * 0.06;
                else if (lineCount <= 7) fontSize = min(width, height) * 0.045;
                else fontSize = min(width, height) * 0.035;
                if (totalChars > 300) fontSize *= 0.85;
                else if (totalChars > 200) fontSize *= 0.9;
                fontSize = constrain(fontSize, 16, 120);
            }
            
            pg.textFont('Cormorant Garamond');
            pg.textSize(fontSize);
            
            if (currentEmo === 'love') pg.textStyle(BOLD);
            else pg.textStyle(NORMAL);
            
            if (currentEmo === 'love') pg.textLeading(fontSize * 1.6);
            else pg.textLeading(fontSize * 1.3);
            
            pg.text(txt, width/2, height/2);
            pg.loadPixels();
            
            let step = currentEmo === 'love' ? 4 : (totalChars > 200 || width > 1500 ? 4 : 3);

            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let index = (x + y * width) * 4;
                    if (pg.pixels[index + 3] > 128) {
                        particles.push(new Particle(x, y, particles.length));
                    }
                }
            }
        }

        // === Particle Class ===
        class Particle {
            constructor(x, y, id) {
                this.ox = x;
                this.oy = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.size = random(2, 4);
                this.id = id; 
                
                this.isCore = random(1) < 0.35; 
            }

            update(emo) {
                let t = millis() * 0.001;

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.9;
                this.vy *= 0.9;

                let d = dist(mouseX, mouseY, this.ox, this.oy);
                let revealRadius = 150; 
                
                if (d < revealRadius) {
                    let pullStrength = map(d, 0, revealRadius, 0.4, 0.05);
                    this.x = lerp(this.x, this.ox, pullStrength);
                    this.y = lerp(this.y, this.oy, pullStrength);
                } else {
                    let effectMultiplier = this.isCore ? 0.15 : 1.0; 

                    if (emo === 'neutral') {
                        this.x = lerp(this.x, this.ox, 0.1);
                        this.y = lerp(this.y, this.oy + sin(t + this.ox * 0.05) * 2 * effectMultiplier, 0.1);
                    }
                    else if (emo === 'repression') {
                        this.x = lerp(this.x, this.ox, 0.05);
                        this.y = lerp(this.y, this.oy, 0.05);
                    }
                    else if (emo === 'joy') {
                        let pulseSpeed = 3 * emotionIntensity; 
                        let pulseRange = 12 * emotionIntensity * effectMultiplier; 
                        let expansionFactor = 0.08 * emotionIntensity * effectMultiplier; 
                        
                        let dx = this.ox - width/2;
                        let dy = this.oy - height/2;
                        let distFromCenter = sqrt(dx*dx + dy*dy);
                        let pulse = sin(t * pulseSpeed - distFromCenter * 0.02) * pulseRange;
                        
                        let targetX = this.ox + (dx * expansionFactor) + (dx/distFromCenter) * pulse;
                        let targetY = this.oy + (dy * expansionFactor) + (dy/distFromCenter) * pulse;

                        this.x = lerp(this.x, targetX, 0.1);
                        this.y = lerp(this.y, targetY, 0.1);
                    }
                    else if (emo === 'melancholy') {
                        let meltSpeed = 1.0 * emotionIntensity; 
                        let threshold = 0.55 - (emotionIntensity * 0.25); 
                        
                        if (!this.isCore) {
                            let n = noise(this.ox * 0.01, t * 0.5);
                            if (n > threshold) this.y += meltSpeed;
                        }
                        
                        let swayAmount = 4 * emotionIntensity * effectMultiplier; 
                        this.x = lerp(this.x, this.ox + sin(t + this.oy * 0.05) * swayAmount, 0.1);

                        if (this.y > height) {
                            this.y = this.oy;
                            this.x = this.ox;
                        }
                    }
                    else if (emo === 'anger') {
                        let shakeAmount = 4 * emotionIntensity * effectMultiplier; 
                        let explosionChance = 0.02 * emotionIntensity; 
                        let explosionRange = 40 * emotionIntensity; 
                        
                        this.x = this.ox + random(-shakeAmount, shakeAmount);
                        this.y = this.oy + random(-shakeAmount, shakeAmount);
                        
                        if (!this.isCore && random(1) < explosionChance) { 
                            this.x += random(-explosionRange, explosionRange);
                            this.y += random(-explosionRange, explosionRange);
                        }
                    }
                    else if (emo === 'mystery') {
                        let glitchChance = 0.08 * emotionIntensity; 
                        let glitchRange = 60 * emotionIntensity * effectMultiplier; 
                        
                        if (!this.isCore && random(1) < glitchChance) { 
                            this.x = this.ox + random(-glitchRange, glitchRange);
                        } else {
                            this.x = lerp(this.x, this.ox, 0.5);
                        }
                        this.y = this.oy + sin(t * 50) * 1 * effectMultiplier;
                    }
                    else if (emo === 'love') {
                        let floatX = sin(t + this.ox * 0.01) * 2 * effectMultiplier;
                        let floatY = cos(t * 0.8 + this.oy * 0.01) * 3 * effectMultiplier;
                        
                        this.x = lerp(this.x, this.ox + floatX, 0.1);
                        this.y = lerp(this.y, this.oy + floatY, 0.1);
                    }
                }
            }

            draw(emo) {
                let style = emotionStyles[emo];
                let c = style.color;
                noStroke();

                let baseAlpha = this.isCore ? 255 : 180;

                if (emo === 'repression') {
                    let deletionRate = 0.3 * emotionIntensity; 
                    if (this.isCore && random(1) < 0.02) return;
                    if (!this.isCore && random(1) < deletionRate) return;
                    
                    let minAlpha = 100 - (emotionIntensity * 50); 
                    let maxAlpha = 200 - (emotionIntensity * 50); 
                    fill(c[0], c[1], c[2], random(minAlpha, maxAlpha));
                    rect(this.x, this.y, this.size, this.size);
                }
                else if (emo === 'melancholy') {
                    let alpha = map(this.y, this.oy, height, baseAlpha, 50);
                    fill(c[0], c[1], c[2], alpha);
                    ellipse(this.x, this.y, this.size * 0.8, this.size * 1.5);
                    if (!this.isCore && random(1) < 0.3) {
                        fill(c[0], c[1], c[2], alpha * 0.5);
                        ellipse(this.x, this.y + this.size, this.size * 0.5, this.size * 0.8);
                    }
                }
                else if (emo === 'mystery') {
                    if (random(1) > 0.85) return;
                    fill(c[0], c[1], c[2], baseAlpha - 50);
                    let scanWidth = random(4, 12);
                    rect(this.x - scanWidth/2, this.y, scanWidth, 1);
                    if (!this.isCore && random(1) < 0.1) {
                        rect(this.x, this.y - 3, 1, 6);
                    }
                }
                else if (emo === 'anger') {
                    fill(c[0], c[1], c[2], baseAlpha);
                    let w = random(3, 8);
                    let h = random(3, 8);
                    push();
                    translate(this.x, this.y);
                    rotate(random(TWO_PI));
                    rect(0, 0, w, h);
                    pop();
                }
                else if (emo === 'joy') {
                    fill(c[0], c[1], c[2], baseAlpha);
                    ellipse(this.x, this.y, this.size, this.size);
                }
                else if (emo === 'love') {
                    let useColor2 = (floor(this.ox / 10) + floor(this.oy / 10)) % 2 === 0;
                    let baseColor = useColor2 ? style.color2 : style.color;
                    
                    let r = constrain(baseColor[0] + (emotionIntensity - 0.5) * 40, 140, 220);
                    let g = constrain(baseColor[1] + (emotionIntensity - 0.5) * 30, 80, 160);
                    let b = constrain(baseColor[2] + (emotionIntensity - 0.5) * 30, 90, 170);
                    
                    fill(r, g, b, baseAlpha);
                    
                    let s = this.size * 2.0;
                    ellipse(this.x - s * 0.25, this.y - s * 0.15, s * 0.7, s * 0.7);
                    ellipse(this.x + s * 0.25, this.y - s * 0.15, s * 0.7, s * 0.7);
                    triangle(this.x - s * 0.55, this.y - s * 0.1, this.x + s * 0.55, this.y - s * 0.1, this.x, this.y + s * 0.7);
                }
                else {
                    fill(c[0], c[1], c[2], baseAlpha);
                    ellipse(this.x, this.y, this.size, this.size);
                }
            }
        }
    </script>
