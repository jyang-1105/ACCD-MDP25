<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Encryption - Writing System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2a2520;
            font-family: 'Georgia', serif;
            overflow: hidden;
            height: 100vh;
        }

        /* Header - Hidden */
        #header {
            display: none;
        }

        /* Main Container - Full Screen */
        #container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Canvas Panel - Full Screen Background */
        #canvas-panel {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        /* Input Panel - Bottom Overlay */
        #input-panel {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(42, 37, 32, 0.95);
            padding: 25px 30px;
            border-radius: 12px 12px 0 0;
            border: 1px solid rgba(106, 95, 79, 0.3);
            border-bottom: none;
            box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            z-index: 100;
            transition: transform 0.3s ease;
        }


        #prompt-questions {
            margin-bottom: 15px;
            color: rgba(212, 197, 169, 0.8);
            font-size: 14px;
            line-height: 1.8;
            font-style: italic;
            text-align: center;
            min-height: 25px;
        }

        textarea {
            width: 100%;
            min-height: 80px;
            max-height: 150px;
            padding: 15px;
            font-family: 'Georgia', serif;
            font-size: 14px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(168, 152, 118, 0.2);
            border-radius: 6px;
            resize: vertical;
            color: #d4c5a9;
            transition: all 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: rgba(168, 152, 118, 0.5);
            background: rgba(0, 0, 0, 0.5);
        }

        textarea::placeholder {
            color: rgba(168, 152, 118, 0.4);
            font-style: italic;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: rgba(74, 63, 47, 0.6);
            color: #d4c5a9;
            border: 1px solid rgba(106, 95, 79, 0.4);
            border-radius: 6px;
            font-family: 'Georgia', serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(74, 63, 47, 0.9);
            border-color: rgba(168, 152, 118, 0.6);
        }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Emotion Display - Hidden */
        #emotion-info {
            display: none !important;
        }

        /* Loading indicator */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(168, 152, 118, 0.6);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: none;
            z-index: 50;
        }

        #loading.show {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #input-panel {
                width: 100%;
                border-radius: 0;
                padding: 20px;
            }
            
            textarea {
                min-height: 60px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div id="header">
        <h1>Emotional Encryption</h1>
        <p>An Experimental Writing System / Archaeological Typography</p>
    </div>

    <!-- Main Container -->
    <div id="container">
        <!-- Canvas Panel - Full Screen -->
        <div id="canvas-panel">
            <div id="canvas-container"></div>
        </div>

        <!-- Loading Indicator -->
        <div id="loading">Analyzing...</div>

        <!-- Input Panel - Bottom -->
        <div id="input-panel">

            <!-- Prompt Question - Single Question Display -->
            <div id="prompt-questions">
                <p id="current-prompt"></p>
            </div>
            
            <textarea id="textInput" placeholder="Type your answer here..."></textarea>
            
            <button id="analyzeBtn" onclick="analyzeAndRender()">Send</button>
            
            <!-- Emotion Detection Result -->
            <div id="emotion-info">
                <p id="emotion-result"></p>
            </div>
        </div>
    </div>

    <script>
        // === Global Variables ===
        let pg;
        let particles = [];
        let currentEmo = "neutral";
        let currentText = "";
        let canvasParent;
        let emotionIntensity = 0.5; // Emotion intensity (0-1)
        
        // Background color transition system
        let currentBgColor = [42, 37, 32];  // Start color
        let targetBgColor = [42, 37, 32];   // Target color
        let bgTransitionSpeed = 0.05;       // Smooth transition speed

        const promptQuestions = [
            "How do you feel right now?",
            "What's on your mind?",
            "Who or what matters most to you?",
            "What emotion fills your heart?",
            "What words have you left unsaid?",
            "What story needs to be told?",
            "Who are you thinking of?",
            "What weighs on your heart?"
        ];
        
        let currentPromptIndex = 0;
        
        // Display first prompt on load
        function updatePrompt() {
            document.getElementById('current-prompt').textContent = promptQuestions[currentPromptIndex];
        }
        
        // Cycle to next prompt after transformation
        function nextPrompt() {
            currentPromptIndex = (currentPromptIndex + 1) % promptQuestions.length;
            updatePrompt();
        }

        // === Advanced Tone Intensity Analyzer ===
        // Captures not just word count, but the FORCE of expression
        function calculateIntensity(text) {
            const analysis = {
                wordCount: 0,
                punctuation: { exclamation: 0, question: 0, multiPunct: 0 },
                typography: { capsWords: 0, capsRatio: 0 },
                emotionalDragging: { repeatedChars: 0, elongatedWords: [] },
                intensifiers: { words: [], count: 0 },
                rawScores: {},
                finalIntensity: 0
            };
            
            // === 1. WORD COUNT (Base Input Volume) ===
            // Longer text = more sustained emotion
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            analysis.wordCount = words.length;
            
            // Progressive scaling: short bursts vs sustained expression
            let wordScore = 0;
            if (analysis.wordCount <= 3) {
                wordScore = analysis.wordCount * 0.03; // 0-0.09 for very short
            } else if (analysis.wordCount <= 10) {
                wordScore = 0.09 + (analysis.wordCount - 3) * 0.02; // 0.09-0.23
            } else {
                wordScore = 0.23 + Math.min((analysis.wordCount - 10) * 0.01, 0.17); // Max 0.4
            }
            analysis.rawScores.wordCount = wordScore;
            
            // === 2. PUNCTUATION (Emotional Markers) ===
            // Multiple marks = exponential intensity
            analysis.punctuation.exclamation = (text.match(/!/g) || []).length;
            analysis.punctuation.question = (text.match(/\?/g) || []).length;
            
            // Detect clustered punctuation (!!!, ???, !?!?)
            const multiPunctPatterns = text.match(/[!?]{2,}/g) || [];
            analysis.punctuation.multiPunct = multiPunctPatterns.length;
            
            let punctScore = 0;
            // Single exclamation/question
            punctScore += analysis.punctuation.exclamation * 0.12;
            punctScore += analysis.punctuation.question * 0.08;
            
            // BONUS for clusters: !! = +0.25, !!! = +0.4
            multiPunctPatterns.forEach(cluster => {
                if (cluster.length >= 3) punctScore += 0.4;
                else if (cluster.length === 2) punctScore += 0.25;
            });
            
            punctScore = Math.min(punctScore, 0.5); // Cap at 0.5
            analysis.rawScores.punctuation = punctScore;
            
            // === 3. TYPOGRAPHY (Visual Shouting) ===
            // ALL CAPS = yelling/emphasis
            const capsWords = text.match(/\b[A-Z]{2,}\b/g) || [];
            analysis.typography.capsWords = capsWords.length;
            
            // Calculate CAPS ratio (percentage of text in caps)
            const totalChars = text.replace(/\s/g, '').length;
            const capsChars = text.replace(/[^A-Z]/g, '').length;
            analysis.typography.capsRatio = totalChars > 0 ? capsChars / totalChars : 0;
            
            let typoScore = 0;
            // Per-word CAPS scoring
            typoScore += analysis.typography.capsWords * 0.15;
            
            // BONUS if >30% of text is CAPS
            if (analysis.typography.capsRatio > 0.3) {
                typoScore += 0.25;
            } else if (analysis.typography.capsRatio > 0.5) {
                typoScore += 0.4; // Half or more text is CAPS
            }
            
            typoScore = Math.min(typoScore, 0.45); // Cap at 0.45
            analysis.rawScores.typography = typoScore;
            
            // === 4. EMOTIONAL DRAGGING (Repeated Characters) ===
            // "sooooo", "noooo", "yessss" = stretching emotion
            const repeatedPatterns = text.match(/([a-z])\1{2,}/gi) || [];
            analysis.emotionalDragging.repeatedChars = repeatedPatterns.length;
            
            // Extract the actual elongated words for context
            repeatedPatterns.forEach(pattern => {
                const wordMatch = text.match(new RegExp(`\\b\\w*${pattern}\\w*\\b`, 'i'));
                if (wordMatch) analysis.emotionalDragging.elongatedWords.push(wordMatch[0]);
            });
            
            let dragScore = 0;
            repeatedPatterns.forEach(pattern => {
                const repeatLength = pattern.length;
                if (repeatLength >= 5) dragScore += 0.3; // "ooooo" = very intense
                else if (repeatLength >= 3) dragScore += 0.2; // "ooo" = moderate
                else dragScore += 0.1; // "oo" = slight
            });
            
            dragScore = Math.min(dragScore, 0.4); // Cap at 0.4
            analysis.rawScores.emotionalDragging = dragScore;
            
            // === 5. INTENSIFIERS (Degree Adverbs) ===
            // Words that amplify emotion
            const intensifierPatterns = {
                extreme: /\b(extremely|absolutely|completely|totally|utterly|entirely)\b/gi,
                high: /\b(very|really|so|super|incredibly|amazingly|terribly)\b/gi,
                medium: /\b(quite|pretty|fairly|rather|somewhat)\b/gi
            };
            
            const extremeMatches = text.match(intensifierPatterns.extreme) || [];
            const highMatches = text.match(intensifierPatterns.high) || [];
            const mediumMatches = text.match(intensifierPatterns.medium) || [];
            
            analysis.intensifiers.words = [
                ...extremeMatches.map(w => ({ word: w, level: 'extreme' })),
                ...highMatches.map(w => ({ word: w, level: 'high' })),
                ...mediumMatches.map(w => ({ word: w, level: 'medium' }))
            ];
            analysis.intensifiers.count = analysis.intensifiers.words.length;
            
            let intensifierScore = 0;
            intensifierScore += extremeMatches.length * 0.25; // "extremely" = +0.25
            intensifierScore += highMatches.length * 0.15;    // "very" = +0.15
            intensifierScore += mediumMatches.length * 0.08;  // "quite" = +0.08
            
            intensifierScore = Math.min(intensifierScore, 0.45); // Cap at 0.45
            analysis.rawScores.intensifiers = intensifierScore;
            
            // === FINAL INTENSITY CALCULATION ===
            const totalScore = 
                wordScore + 
                punctScore + 
                typoScore + 
                dragScore + 
                intensifierScore;
            
            // Map to 0.15-1.0 range with curve
            // Low scores stay low, high scores saturate near 1.0
            let finalIntensity = 0.15 + (totalScore * 0.85);
            finalIntensity = Math.pow(finalIntensity, 0.9); // Slight curve for natural feel
            finalIntensity = Math.max(0.15, Math.min(1.0, finalIntensity));
            
            analysis.finalIntensity = finalIntensity;
            
            // === CONSOLE LOGGING ===
            console.log(`
╔════════════════════════════════════════════════════════════╗
║          TONE INTENSITY ANALYSIS                           ║
╠════════════════════════════════════════════════════════════╣
║ TEXT: "${text.substring(0, 40)}${text.length > 40 ? '...' : ''}"
╠════════════════════════════════════════════════════════════╣
║ 1. Word Count: ${analysis.wordCount} words → ${wordScore.toFixed(3)}
║ 2. Punctuation:
║    • Exclamations: ${analysis.punctuation.exclamation}
║    • Questions: ${analysis.punctuation.question}
║    • Clusters: ${analysis.punctuation.multiPunct} → ${punctScore.toFixed(3)}
║ 3. Typography:
║    • CAPS words: ${analysis.typography.capsWords}
║    • CAPS ratio: ${(analysis.typography.capsRatio * 100).toFixed(1)}% → ${typoScore.toFixed(3)}
║ 4. Emotional Dragging:
║    • Repeated chars: ${analysis.emotionalDragging.repeatedChars}
║    • Words: [${analysis.emotionalDragging.elongatedWords.join(', ')}] → ${dragScore.toFixed(3)}
║ 5. Intensifiers:
║    • Count: ${analysis.intensifiers.count}
║    • Words: [${analysis.intensifiers.words.map(i => i.word).join(', ')}] → ${intensifierScore.toFixed(3)}
╠════════════════════════════════════════════════════════════╣
║ TOTAL RAW SCORE: ${totalScore.toFixed(3)}
║ ★ FINAL INTENSITY: ${finalIntensity.toFixed(3)} ★
╚════════════════════════════════════════════════════════════╝
            `);
            
            return finalIntensity;
        }
        const emotionStyles = {
            neutral: {
                color: [180, 180, 185],
                bg: [42, 37, 32],
                name: "Neutral"
            },
            repression: {
                color: [150, 150, 155],
                bg: [38, 38, 40],  // Slightly cooler grey
                name: "Repression / Anxiety"
            },
            anger: {
                color: [160, 40, 35],
                bg: [48, 30, 28],  // Dark red-tinted
                name: "Anger / Rage"
            },
            joy: {
                color: [240, 180, 70],
                bg: [45, 40, 30],  // Warm golden-brown
                name: "Joy / Exuberance"
            },
            melancholy: {
                color: [70, 100, 130],
                bg: [32, 35, 40],  // Cool blue-grey
                name: "Melancholy / Sadness"
            },
            mystery: {
                color: [110, 80, 120],
                bg: [38, 32, 42],  // Deep purple-tinted
                name: "Mystery / Unknown"
            },
            love: {
                color: [180, 100, 115],
                color2: [220, 140, 150],
                bg: [45, 35, 38],  // Warm rose-tinted
                name: "Love / Romance"
            }
        };

        // === P5.js Setup ===
        function setup() {
            canvasParent = document.getElementById('canvas-container');
            let canvas = createCanvas(windowWidth, windowHeight);
            canvas.parent(canvasParent);
            pixelDensity(1);
            
            pg = createGraphics(width, height);
            
            // Initial placeholder
            generateParticles("WRITE\nSOMETHING");
            
            // Display first prompt question
            updatePrompt();
        }

        // === P5.js Draw Loop ===
        function draw() {
            let style = emotionStyles[currentEmo];
            let t = millis() * 0.001; // Time for animation
            
            // === SMOOTH BACKGROUND TRANSITION ===
            // Update target color when emotion changes
            targetBgColor = style.bg;
            
            // Lerp current color towards target
            currentBgColor[0] = lerp(currentBgColor[0], targetBgColor[0], bgTransitionSpeed);
            currentBgColor[1] = lerp(currentBgColor[1], targetBgColor[1], bgTransitionSpeed);
            currentBgColor[2] = lerp(currentBgColor[2], targetBgColor[2], bgTransitionSpeed);
            
            // Draw smoothly transitioning background
            background(currentBgColor[0], currentBgColor[1], currentBgColor[2]);
            
            // === Emotion-Specific Background Effects ===
            
            if (currentEmo === 'anger') {
                // Deep red flicker - low frequency pulsing
                let flicker = sin(t * 0.5) * 0.5 + 0.5; // 0 to 1
                let intensity = flicker * 15; // Subtle intensity
                fill(120, 20, 20, intensity);
                rect(0, 0, width, height);
                
                // Random sharp flashes (rare)
                if (random(1) < 0.01) {
                    fill(150, 30, 30, 30);
                    rect(0, 0, width, height);
                }
            }
            
            else if (currentEmo === 'love') {
                // Soft pink gradient pulse from center
                let pulse = sin(t * 0.8) * 0.5 + 0.5;
                let gradient = drawingContext.createRadialGradient(
                    width/2, height/2, 0,
                    width/2, height/2, width * 0.8
                );
                gradient.addColorStop(0, `rgba(200, 130, 140, ${pulse * 0.08})`);
                gradient.addColorStop(1, 'rgba(42, 37, 32, 0)');
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            
            else if (currentEmo === 'melancholy') {
                // Blue-grey noise overlay
                for (let i = 0; i < 50; i++) {
                    let x = random(width);
                    let y = random(height);
                    let size = random(1, 3);
                    let alpha = random(5, 15);
                    fill(80, 100, 120, alpha);
                    noStroke();
                    ellipse(x, y, size);
                }
                
                // Slow downward gradient
                let gradient = drawingContext.createLinearGradient(0, 0, 0, height);
                gradient.addColorStop(0, 'rgba(42, 37, 32, 0)');
                gradient.addColorStop(1, 'rgba(60, 75, 90, 0.15)');
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            
            // Joy has no background effect - clean particles only
            
            else if (currentEmo === 'repression') {
                // Static noise overlay - anxiety texture
                for (let i = 0; i < 100; i++) {
                    let x = random(width);
                    let y = random(height);
                    let alpha = random(3, 10);
                    stroke(200, 200, 200, alpha);
                    point(x, y);
                }
                
                // Breathing vignette
                let vignette = sin(t * 0.6) * 0.3 + 0.7;
                let gradient = drawingContext.createRadialGradient(
                    width/2, height/2, width * 0.3,
                    width/2, height/2, width * 0.8
                );
                gradient.addColorStop(0, 'rgba(42, 37, 32, 0)');
                gradient.addColorStop(1, `rgba(20, 20, 22, ${vignette * 0.3})`);
                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }
            
            else if (currentEmo === 'mystery') {
                // Shifting purple haze
                let shift = sin(t * 0.4) * 20 + 90;
                fill(shift, 70, 100, 8);
                rect(0, 0, width, height);
                
                // Scanline effect
                if (frameCount % 2 === 0) {
                    stroke(110, 90, 120, 15);
                    strokeWeight(1);
                    for (let y = 0; y < height; y += random(3, 8)) {
                        line(0, y, width, y);
                    }
                }
            }

            // Draw particles on top of background effects
            for (let i = 0; i < particles.length; i++) {
                particles[i].update(currentEmo);
                particles[i].draw(currentEmo);
            }
        }

        // === Window Resize ===
        function windowResized() {
            let newWidth = canvasParent.offsetWidth;
            let newHeight = canvasParent.offsetHeight;
            resizeCanvas(newWidth, newHeight);
            pg = createGraphics(width, height);
            if (currentText) {
                generateParticles(currentText);
            }
        }

        // === Analyze Text with AI ===
        async function analyzeAndRender() {
            const textInput = document.getElementById('textInput').value.trim();
            
            if (!textInput) {
                alert('Please enter some text first.');
                return;
            }

            // Show loading
            document.getElementById('loading').classList.add('show');
            document.getElementById('analyzeBtn').disabled = true;

            try {
                // Call emotion detection
                const emotion = detectEmotion(textInput);
                
                // Calculate emotion intensity
                emotionIntensity = calculateIntensity(textInput);
                
                // Update UI
                currentEmo = emotion;
                currentText = textInput;
                
                document.getElementById('emotion-result').innerHTML = 
                    `<strong>${emotionStyles[emotion].name}</strong>`;
                document.getElementById('emotion-info').classList.add('show');
                
                // Generate particles
                generateParticles(formatText(textInput));
                
                // Move to next prompt question
                nextPrompt();
                
                // Clear textarea for next input
                document.getElementById('textInput').value = '';
                
            } catch (error) {
                console.error('Analysis error:', error);
                alert('Error analyzing text. Please try again.');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        // === Emotion Detection (keyword-based) ===
        function detectEmotion(text) {
            return keywordFallback(text);
        }

        // Fallback keyword detection
        function keywordFallback(text) {
            // Normalize: lowercase + unify all apostrophe variants
            const lowerText = text.toLowerCase()
                .replace(/[\u2018\u2019\u02bc\u0060\u00b4]/g, "'");
            
            const keywords = {
                melancholy: [
                    'sad', 'sadness', 'cry', 'crying', 'cried', 'tears', 'weep',
                    'grief', 'sorrow', 'miserable',
                    'miss', 'missing', 'lost', 'gone', 'empty', 'emptiness', 'void', 'hollow',
                    'lonely', 'loneliness', 'alone', 'isolated', 'abandoned', 'forgotten',
                    'pain', 'painful', 'hurt', 'hurts', 'hurting',
                    'ache', 'aching', 'sore', 'wound', 'wounded',
                    'suffer', 'suffering', 'unbearable',
                    'exhausted', 'drained', 'depleted', 'worn out', 'worn down',
                    'numb', 'feel nothing', 'feeling nothing',
                    'heavy', 'burden', 'broken', 'shattered', 'crushed',
                    'hopeless', 'pointless', 'meaningless', 'worthless',
                    'giving up', 'give up', 'no reason',
                    'tired of', 'so tired', 'not okay', 'not fine',
                    'invisible', 'disappear', 'no one understands', 'no one cares',
                    'falling apart', 'fell apart', 'fall apart',
                    'body feels', 'body feel', 'feel weak', 'feeling weak',
                    'body hurts', 'everything hurts', 'it hurts',
                    'no energy', 'no motivation', 'hard to get up'
                ],
                repression: [
                    "can't sleep", 'cant sleep', 'cannot sleep', 'can not sleep',
                    "can't rest", 'cant rest', 'cannot rest',
                    "can't relax", 'cant relax', 'cannot relax',
                    'sleepless', 'insomnia', 'awake at', 'up all night',
                    'lying awake', 'wide awake', 'staring at the ceiling',
                    "mind won't stop", 'mind wont stop', 'thoughts racing', 'overthinking',
                    'keep thinking', 'keeps thinking',
                    'anxious', 'anxiety', 'worry', 'worried', 'worrying',
                    'nervous', 'on edge', 'uneasy', 'restless', 'tense',
                    'fear', 'scared', 'afraid', 'terrified', 'dread', 'dreading', 'panic',
                    'stressed', 'stress', 'pressure', 'overwhelmed', 'too much',
                    "can't handle", 'cant handle', 'cannot handle',
                    "can't cope", 'cant cope', 'cannot cope',
                    'falling behind', 'deadline',
                    'trapped', 'stuck', 'suffocating',
                    "can't breathe", 'cant breathe', 'chest tight',
                    'frozen', 'paralyzed', 'helpless', 'powerless',
                    'holding back', 'pretending', 'fake smile', 'hiding', 'mask',
                    'still awake', 'another night', '3am', '4am', '2am',
                    'middle of the night', 'late at night', 'dark and quiet'
                ],
                anger: [
                    'angry', 'anger', 'furious', 'fuming', 'livid', 'outraged',
                    'rage', 'raging', 'enraged', 'seething',
                    'hate', 'hatred', 'despise', 'loathe',
                    'frustrated', 'frustration', 'annoyed', 'irritated', 'pissed',
                    'fed up', 'sick of', 'had enough', 'enough is enough',
                    'unfair', 'unjust', 'unacceptable', 'ridiculous', 'outrageous',
                    'betrayed', 'lied to', 'manipulated', 'cheated',
                    'want to scream', 'want to yell', 'could scream', 'could explode',
                    'about to snap', 'losing it', 'lose my mind'
                ],
                joy: [
                    'happy', 'happiness', 'joy', 'joyful', 'delighted', 'cheerful', 'glad',
                    'excited', 'excitement', 'thrilled', 'ecstatic', 'elated',
                    'over the moon', 'on top of the world',
                    'proud', 'pride', 'achieved', 'accomplished', 'finally', 'made it',
                    'i did it', 'success', 'dream came true',
                    'grateful', 'thankful', 'blessed', 'lucky',
                    'laugh', 'laughing', 'smile', 'smiling',
                    'wonderful', 'amazing', 'fantastic', 'incredible',
                    'love this', 'love it', 'best day', 'relief', 'relieved'
                ],
                love: [
                    'love you', 'i love', 'in love', 'fell in love',
                    'adore', 'cherish', 'treasure',
                    'darling', 'sweetheart', 'my love', 'my heart', 'soulmate',
                    'kiss', 'embrace', 'hold you', 'arms around',
                    'miss you', 'missing you', 'think of you', 'think about you',
                    'always thinking', 'you are always', "you're always",
                    'need you', 'want you', 'only you', 'just you',
                    'feel safe', 'feels like home', 'comfort',
                    'forever', 'never leave', 'stay with you', 'grow old'
                ],
                mystery: [
                    'strange', 'odd', 'weird', 'bizarre', 'peculiar', 'uncanny',
                    'not sure', 'unsure', 'uncertain',
                    "don't know", 'dont know',
                    "can't explain", 'cant explain',
                    'something feels', 'something seems', 'something off',
                    "doesn't feel right", 'doesnt feel right', 'feels wrong', 'feels off',
                    'surreal', 'unreal', 'dreamlike', 'not real',
                    'disoriented', 'floating', 'in between', 'limbo', 'drifting',
                    'mysterious', 'secret', 'hidden', 'unknown', 'unexplained',
                    'haunting', 'haunted', 'curious'
                ]
            };
            
            let scores = {};
            for (let emotion in keywords) {
                scores[emotion] = keywords[emotion].filter(word => 
                    lowerText.includes(word)
                ).length;
            }
            
            let maxEmotion = 'neutral';
            let maxScore = 0;
            for (let emotion in scores) {
                if (scores[emotion] > maxScore) {
                    maxScore = scores[emotion];
                    maxEmotion = emotion;
                }
            }
            
            return maxEmotion;
        }

        // === Format Text for Display ===
        function formatText(text) {
            // Clean text
            text = text.trim();
            
            // Break long text into multiple lines based on character count
            let words = text.split(' ');
            let lines = [];
            let currentLine = '';
            
            // Calculate characters per line based on text length
            let totalChars = text.length;
            let charsPerLine;
            
            // Love emotion needs balanced line length - ensure all text fits on screen
            if (currentEmo === 'love') {
                if (totalChars < 30) {
                    charsPerLine = 50;
                } else if (totalChars < 80) {
                    charsPerLine = 80; // Increased from 60 - fit whole sentence in 1 line
                } else if (totalChars < 150) {
                    charsPerLine = 90; 
                } else if (totalChars < 250) {
                    charsPerLine = 100;
                } else {
                    charsPerLine = 110;
                }
            } else {
                // Normal line breaking for other emotions
                if (totalChars < 50) {
                    charsPerLine = 30;
                } else if (totalChars < 150) {
                    charsPerLine = 40;
                } else if (totalChars < 300) {
                    charsPerLine = 50;
                } else {
                    charsPerLine = 60;
                }
            }
            
            for (let i = 0; i < words.length; i++) {
                let testLine = currentLine + words[i] + ' ';
                
                if (testLine.length > charsPerLine && currentLine.length > 0) {
                    lines.push(currentLine.trim());
                    currentLine = words[i] + ' ';
                } else {
                    currentLine = testLine;
                }
            }
            
            if (currentLine.trim().length > 0) {
                lines.push(currentLine.trim());
            }
            
            console.log(`formatText - Input: "${text.substring(0, 50)}..." (${totalChars} chars)`);
            console.log(`formatText - Lines generated: ${lines.length}, charsPerLine: ${charsPerLine}`);
            console.log(`formatText - Lines:`, lines);
            
            // Limit maximum lines - slightly more for love to show complete sentences
            let maxLines = currentEmo === 'love' ? 6 : 8; // Love: max 6 lines
            if (lines.length > maxLines) {
                console.log(`formatText - Truncating from ${lines.length} to ${maxLines} lines`);
                lines = lines.slice(0, maxLines);
                lines[maxLines - 1] += '...';
            }
            
            return lines.join('\n');
        }

        // === Generate Particles from Text ===
        function generateParticles(txt) {
            particles = [];
            
            pg.clear();
            pg.background(0, 0);
            pg.fill(255);
            pg.noStroke();
            pg.textAlign(CENTER, CENTER);
            
            // Calculate appropriate font size based on text characteristics
            let lines = txt.split('\n');
            let lineCount = lines.length;
            let longestLine = Math.max(...lines.map(l => l.length));
            let totalChars = txt.length; // Define totalChars first
            
            // Adaptive font sizing algorithm
            let fontSize;
            
            // Special handling for love emotion - needs bigger font for heart visibility
            if (currentEmo === 'love') {
                // Love emotion uses MUCH larger fonts because hearts need space
                // But also needs to fit on screen width
                
                if (lineCount <= 1) {
                    // Single line - calculate based on screen width
                    fontSize = min(width / longestLine * 1.2, height * 0.16);
                } else if (lineCount <= 2) {
                    fontSize = min(width / longestLine * 1.2, height * 0.13);
                } else if (lineCount <= 3) {
                    fontSize = min(width / longestLine * 1.2, height * 0.11);
                } else if (lineCount <= 4) {
                    fontSize = min(width / longestLine * 1.3, height * 0.09);
                } else if (lineCount <= 5) {
                    fontSize = min(width / longestLine * 1.4, height * 0.08);
                } else {
                    fontSize = min(width / longestLine * 1.5, height * 0.07);
                }
                
                // Love: minimal character density penalty (hearts need to be big)
                if (totalChars > 300) {
                    fontSize *= 0.95;
                } else if (totalChars > 200) {
                    fontSize *= 0.97;
                }
            } else {
                // Normal font sizing for other emotions
                if (lineCount <= 2 && longestLine < 30) {
                    // Short text - large font
                    fontSize = min(width, height) * 0.12;
                } else if (lineCount <= 3 && longestLine < 50) {
                    // Medium short text
                    fontSize = min(width, height) * 0.08;
                } else if (lineCount <= 5 && longestLine < 70) {
                    // Medium text
                    fontSize = min(width, height) * 0.06;
                } else if (lineCount <= 7) {
                    // Long text
                    fontSize = min(width, height) * 0.045;
                } else {
                    // Very long text
                    fontSize = min(width, height) * 0.035;
                }
                
                // Character density adjustment
                if (totalChars > 300) {
                    fontSize *= 0.85;
                } else if (totalChars > 200) {
                    fontSize *= 0.9;
                }
            }
            
            // Set boundaries - higher minimum for love
            if (currentEmo === 'love') {
                fontSize = constrain(fontSize, 30, 150); // Love needs bigger minimum
            } else {
                fontSize = constrain(fontSize, 16, 120);
            }
            
            pg.textSize(fontSize);
            
            // Love emotion uses BOLD font for better letter clarity
            if (currentEmo === 'love') {
                pg.textStyle(BOLD);
            } else {
                pg.textStyle(NORMAL);
            }
            
            // Love emotion needs more line spacing for heart visibility
            if (currentEmo === 'love') {
                pg.textLeading(fontSize * 1.6); // More spacing for love
            } else {
                pg.textLeading(fontSize * 1.3); // Normal spacing
            }
            
            pg.text(txt, width/2, height/2);
            
            pg.loadPixels();
            
            // Adaptive sampling density based on text amount
            let step = 3;
            
            // For love emotion, use denser particles for clearer heart shape
            if (currentEmo === 'love') {
                step = 4; // Denser particles to preserve letter details
            } else if (totalChars > 200) {
                step = 4; // Fewer particles for long text (performance)
            } else if (width > 1500) {
                step = 4; // Large screens
            }

            for (let y = 0; y < height; y += step) {
                for (let x = 0; x < width; x += step) {
                    let index = (x + y * width) * 4;
                    
                    if (pg.pixels[index + 3] > 128) {
                        particles.push(new Particle(x, y, particles.length));
                    }
                }
            }
            
            console.log(`Generated ${particles.length} particles for ${lineCount} lines, longest: ${longestLine} chars, fontSize: ${fontSize.toFixed(1)}`);
        }

        // === Particle Class ===
        class Particle {
            constructor(x, y, id) {
                this.ox = x;
                this.oy = y;
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.size = random(2, 4);
                this.id = id;
                
                // SKELETON SYSTEM: 30% of particles are "skeleton" particles
                // These maintain letter structure with minimal emotional response
                this.isSkeleton = random(1) < 0.3;
            }

            update(emo) {
                let t = millis() * 0.001;

                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.9;
                this.vy *= 0.9;
                
                // === SKELETON PARTICLE SYSTEM ===
                // Skeleton particles have VERY LOW emotional sensitivity
                // They anchor the letter structure
                if (this.isSkeleton) {
                    // Only subtle breathing motion - no emotion-specific behavior
                    let breathe = sin(t + this.ox * 0.02) * 0.5;
                    this.x = lerp(this.x, this.ox, 0.15);
                    this.y = lerp(this.y, this.oy + breathe, 0.15);
                    return; // Skip all emotion-specific transformations
                }

                if (emo === 'neutral') {
                    this.x = lerp(this.x, this.ox, 0.1);
                    this.y = lerp(this.y, this.oy + sin(t + this.ox * 0.05) * 2, 0.1);
                }
                else if (emo === 'repression') {
                    // INTENSITY EFFECT: Handled in draw() method (particle deletion rate)
                    // Eroding, fading
                    this.x = lerp(this.x, this.ox, 0.05);
                    this.y = lerp(this.y, this.oy, 0.05);
                }
                else if (emo === 'joy') {
                    // INTENSITY EFFECT: Higher intensity = faster pulse, larger expansion
                    let pulseSpeed = 3 * emotionIntensity; // 0.9 to 3
                    let pulseRange = 12 * emotionIntensity; // 3.6 to 12
                    let expansionFactor = 0.08 * emotionIntensity; // 0.024 to 0.08
                    
                    // Expanding outward
                    let dx = this.ox - width/2;
                    let dy = this.oy - height/2;
                    let dist = sqrt(dx*dx + dy*dy);
                    let pulse = sin(t * pulseSpeed - dist * 0.02) * pulseRange;
                    
                    let targetX = this.ox + (dx * expansionFactor) + (dx/dist) * pulse;
                    let targetY = this.oy + (dy * expansionFactor) + (dy/dist) * pulse;

                    this.x = lerp(this.x, targetX, 0.1);
                    this.y = lerp(this.y, targetY, 0.1);
                }
                else if (emo === 'melancholy') {
                    // INTENSITY EFFECT: Higher intensity = faster melting
                    // Reduced base speed for gentler effect
                    let meltSpeed = 1.0 * emotionIntensity; // 0.2 to 1.0 (reduced from 0.45 to 1.5)
                    let threshold = 0.55 - (emotionIntensity * 0.25); // 0.55 to 0.3 (higher threshold = fewer particles melt)
                    
                    // Melting downward
                    let n = noise(this.ox * 0.01, t * 0.5);
                    if (n > threshold) {
                        this.y += meltSpeed;
                    }
                    
                    // Gentler horizontal sway at low intensity
                    let swayAmount = 4 * emotionIntensity; // 0.8 to 4
                    this.x = lerp(this.x, this.ox + sin(t + this.oy * 0.05) * swayAmount, 0.1);

                    if (this.y > height) {
                        this.y = this.oy;
                        this.x = this.ox;
                    }
                }
                else if (emo === 'anger') {
                    // INTENSITY EFFECT: Higher intensity = more violent shaking
                    let shakeAmount = 4 * emotionIntensity; // 1.2 to 4
                    let explosionChance = 0.02 * emotionIntensity; // 0.006 to 0.02
                    let explosionRange = 40 * emotionIntensity; // 12 to 40
                    
                    // Shaking violently
                    this.x = this.ox + random(-shakeAmount, shakeAmount);
                    this.y = this.oy + random(-shakeAmount, shakeAmount);
                    
                    if (random(1) < explosionChance) {
                        this.x += random(-explosionRange, explosionRange);
                        this.y += random(-explosionRange, explosionRange);
                    }
                }
                else if (emo === 'mystery') {
                    // INTENSITY EFFECT: Higher intensity = more frequent glitches
                    let glitchChance = 0.08 * emotionIntensity; // 0.024 to 0.08
                    let glitchRange = 60 * emotionIntensity; // 18 to 60
                    
                    // Glitch displacement
                    if (random(1) < glitchChance) {
                        this.x = this.ox + random(-glitchRange, glitchRange);
                    } else {
                        this.x = lerp(this.x, this.ox, 0.5);
                    }
                    this.y = this.oy + sin(t * 50) * 1;
                }
                else if (emo === 'love') {
                    // Gentle floating with text shape intact
                    let t = millis() * 0.001;
                    
                    // Soft breathing motion
                    let floatX = sin(t + this.ox * 0.01) * 2;
                    let floatY = cos(t * 0.8 + this.oy * 0.01) * 3;
                    
                    this.x = lerp(this.x, this.ox + floatX, 0.1);
                    this.y = lerp(this.y, this.oy + floatY, 0.1);
                }
            }

            draw(emo) {
                let style = emotionStyles[emo];
                let c = style.color;
                
                noStroke();
                
                // === SKELETON PARTICLE RENDERING ===
                // Skeleton particles are always stable, solid, and opaque
                // They form the unchanging structural outline
                if (this.isSkeleton) {
                    fill(c[0], c[1], c[2], 240); // High opacity - always visible
                    ellipse(this.x, this.y, this.size * 1.1, this.size * 1.1); // Slightly larger
                    return; // Skip all emotion-specific rendering
                }

                if (emo === 'repression') {
                    // INTENSITY EFFECT: Higher intensity = more particle deletion (sparser)
                    let deletionRate = 0.3 * emotionIntensity; // 0.09 to 0.3
                    if (random(1) < deletionRate) return;
                    
                    // Higher intensity = lower alpha (more faded)
                    let minAlpha = 100 - (emotionIntensity * 50); // 100 to 50
                    let maxAlpha = 200 - (emotionIntensity * 50); // 200 to 150
                    fill(c[0], c[1], c[2], random(minAlpha, maxAlpha));
                    rect(this.x, this.y, this.size, this.size);
                }
                else if (emo === 'melancholy') {
                    // Teardrop shape - elongated downward
                    let alpha = map(this.y, this.oy, height, 255, 50);
                    fill(c[0], c[1], c[2], alpha);
                    
                    // Draw teardrop (ellipse stretched vertically)
                    ellipse(this.x, this.y, this.size * 0.8, this.size * 1.5);
                    
                    // Small tail at bottom
                    if (random(1) < 0.3) {
                        fill(c[0], c[1], c[2], alpha * 0.5);
                        ellipse(this.x, this.y + this.size, this.size * 0.5, this.size * 0.8);
                    }
                }
                else if (emo === 'mystery') {
                    // Glitchy scanline fragments
                    if (random(1) > 0.85) return;
                    
                    fill(c[0], c[1], c[2], 200);
                    
                    // Horizontal scanline fragments
                    let scanWidth = random(4, 12);
                    rect(this.x - scanWidth/2, this.y, scanWidth, 1);
                    
                    // Occasional vertical glitch
                    if (random(1) < 0.1) {
                        rect(this.x, this.y - 3, 1, 6);
                    }
                }
                else if (emo === 'anger') {
                    fill(c[0], c[1], c[2]);
                    // Jagged, irregular fragments - more aggressive
                    let w = random(3, 8);
                    let h = random(3, 8);
                    push();
                    translate(this.x, this.y);
                    rotate(random(TWO_PI));
                    rect(0, 0, w, h);
                    pop();
                }
                else if (emo === 'joy') {
                    // Simple circles - original version
                    fill(c[0], c[1], c[2]);
                    ellipse(this.x, this.y, this.size, this.size);
                }
                else if (emo === 'love') {
                    // INTENSITY EFFECT: Higher intensity = more saturated/brighter colors
                    let style = emotionStyles[emo];
                    
                    // Alternate between two pink colors based on position
                    let useColor2 = (floor(this.ox / 10) + floor(this.oy / 10)) % 2 === 0;
                    let baseColor = useColor2 ? style.color2 : style.color;
                    
                    // Increase saturation and brightness with intensity
                    let r = baseColor[0] + (emotionIntensity - 0.5) * 40; // ±20
                    let g = baseColor[1] + (emotionIntensity - 0.5) * 30; // ±15
                    let b = baseColor[2] + (emotionIntensity - 0.5) * 30; // ±15
                    
                    // Clamp values
                    r = constrain(r, 140, 220);
                    g = constrain(g, 80, 160);
                    b = constrain(b, 90, 170);
                    
                    fill(r, g, b, 230);
                    noStroke();
                    
                    // Smaller hearts to preserve letter details
                    let s = this.size * 2.0;
                    
                    // Left lobe (circle)
                    ellipse(this.x - s * 0.25, this.y - s * 0.15, s * 0.7, s * 0.7);
                    // Right lobe (circle)
                    ellipse(this.x + s * 0.25, this.y - s * 0.15, s * 0.7, s * 0.7);
                    // Bottom point (triangle)
                    triangle(
                        this.x - s * 0.55, this.y - s * 0.1,
                        this.x + s * 0.55, this.y - s * 0.1,
                        this.x, this.y + s * 0.7
                    );
                }
                else {
                    fill(c[0], c[1], c[2]);
                    ellipse(this.x, this.y, this.size, this.size);
                }
            }
            
            // Helper function to draw heart shape
            drawHeart(x, y, size) {
                push();
                translate(x, y);
                
                // Simple heart using two circles and a triangle
                let s = size;
                let c = emotionStyles['love'].color;
                
                // Top two bumps
                fill(c[0], c[1], c[2], 220);
                ellipse(-s * 0.35, -s * 0.3, s, s);
                ellipse(s * 0.35, -s * 0.3, s, s);
                
                // Bottom point
                triangle(-s * 0.7, -s * 0.3, 
                        s * 0.7, -s * 0.3, 
                        0, s * 0.8);
                
                pop();
            }
        }

        // Make function globally accessible
        window.analyzeAndRender = analyzeAndRender;
    </script>
