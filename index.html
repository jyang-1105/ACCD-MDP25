<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Water · Ink · Memory</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;1,400&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#f4ede0; overflow:hidden; cursor:crosshair; }
  canvas { position:absolute; top:0; left:0; }
  .hint { position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
    font-family:'EB Garamond',serif; font-size:12px; font-style:italic;
    color:rgba(60,40,20,0.28); letter-spacing:0.18em; pointer-events:none;
    z-index:10; transition:opacity 2s; }
  .source { position:fixed; bottom:10px; left:50%; transform:translateX(-50%);
    font-family:'EB Garamond',serif; font-size:9px; color:rgba(60,40,20,0.16);
    pointer-events:none; z-index:10; letter-spacing:0.3em; text-transform:uppercase; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint" id="hint">move to let water fall · click to pour</div>
<div class="source">Hermann Hesse · Klingsor's Last Summer</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');
let W, H, chars = [], drops = [], paper, hintGone = false;

const TEXT = `Winter repeats itself, and those who should meet
will meet again, so we don't have to always worry
about regrets, but learn to look forward to them.

But from then on, we never met again.
The part of me who was changed by you
will forever accompany me in your place.

All the water in the world will meet again,
and the Arctic Ocean and the Nile River
will blend in the wet clouds.

This ancient and beautiful metaphor
makes this moment sacred,
even if we wander,
every road will take us home.`;

function makePaper() {
  paper = document.createElement('canvas');
  paper.width = W; paper.height = H;
  const pc = paper.getContext('2d');
  pc.fillStyle = '#f4ede0'; pc.fillRect(0,0,W,H);
  for (let i=0; i<W*H*0.1; i++) {
    pc.fillStyle = `rgba(${150+Math.random()*60},${120+Math.random()*40},${80+Math.random()*30},${Math.random()*0.045})`;
    pc.fillRect(Math.random()*W, Math.random()*H, Math.random()*2, Math.random()*2);
  }
}

function buildChars() {
  chars = [];
  const lines = TEXT.split('\n');
  const fs = Math.min(21, Math.max(14, W/50));
  const lh = fs * 1.9;
  let y = (H - lines.length*lh*0.85) / 2 + fs;
  lines.forEach((line, li) => {
    if (!line.trim()) { y += lh*0.4; return; }
    const isItalic = li>=4 && li<=6;
    const isQuiet = li>=10;
    const fStyle = isItalic ? 'italic ' : '';
    const fSize = isQuiet ? fs*0.95 : fs;
    const baseAlpha = isQuiet ? 0.5 : isItalic ? 0.7 : 0.65;
    ctx.font = `${fStyle}${fSize}px 'EB Garamond', serif`;
    const lw = ctx.measureText(line).width;
    let x = (W-lw)/2;
    for (const ch of line) {
      const cw = ctx.measureText(ch).width;
      chars.push({ ch, x, y, w:cw, fSize, fStyle, baseAlpha, wet:0, sx:0, sy:0 });
      x += cw;
    }
    y += lh;
  });
}

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width=W; canvas.height=H;
  makePaper(); buildChars(); drops=[];
}

class Drop {
  constructor(x, y, big=false) {
    this.x=x; this.y=y;
    this.r = big ? (Math.random()*5+5) : (Math.random()*2.5+1.5);
    this.vx=(Math.random()-.5)*.4; this.vy=Math.random()*.5+0.1;
    this.life=1; this.settled=false;
    this.inf=this.r*5.5; this.str=this.r*0.012;
  }
  wetChars() {
    chars.forEach(c => {
      const dx=c.x+c.w*.5-this.x, dy=c.y-c.fSize*.3-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (d<this.inf) {
        const prox=1-d/this.inf;
        c.wet=Math.min(c.wet+prox*this.str, 1);
        const ang=Math.atan2(dy,dx), push=prox*this.r*0.07;
        c.sx+=Math.cos(ang)*push; c.sy+=Math.sin(ang)*push*.5;
      }
    });
  }
  update() {
    if (this.settled) { this.life-=0.005; return this.life>0; }
    this.vy+=0.022; this.x+=this.vx; this.y+=this.vy;
    if (this.vy>3||this.y>H-10) this.settled=true;
    this.wetChars(); return true;
  }
  draw() {
    ctx.save();
    ctx.globalAlpha=Math.min(this.life*.6, 0.6);
    const g=ctx.createRadialGradient(this.x-this.r*.3,this.y-this.r*.3,this.r*.05,this.x,this.y,this.r);
    g.addColorStop(0,'rgba(255,253,250,0.9)');
    g.addColorStop(.5,'rgba(210,232,248,0.5)');
    g.addColorStop(1,'rgba(150,195,230,0.08)');
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(170,210,235,0.25)'; ctx.lineWidth=0.5; ctx.stroke();
    ctx.restore();
  }
}

let lastSpawn=0;
window.addEventListener('mousemove', e => {
  if (!hintGone) { hint.style.opacity='0'; hintGone=true; }
  const now=performance.now();
  if (now-lastSpawn>140) {
    drops.push(new Drop(e.clientX+(Math.random()-.5)*8, e.clientY+(Math.random()-.5)*5));
    lastSpawn=now;
  }
});
window.addEventListener('click', e => {
  for (let i=0;i<6;i++) setTimeout(()=>{
    drops.push(new Drop(e.clientX+(Math.random()-.5)*20, e.clientY+(Math.random()-.5)*14, true));
  }, i*55);
});
window.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.touches[0], now=performance.now();
  if(now-lastSpawn>100){ drops.push(new Drop(t.clientX,t.clientY)); lastSpawn=now; }
},{passive:false});

function render() {
  ctx.drawImage(paper,0,0);
  chars.forEach(c => {
    if (!c.ch.trim()) return;
    ctx.save();
    const blur=c.wet*4.5;
    if (blur>0.4) ctx.filter=`blur(${blur.toFixed(2)}px)`;
    const alpha=c.baseAlpha*(1-c.wet*.25);
    ctx.fillStyle=`rgba(${Math.round(38-c.wet*6)},${Math.round(25+c.wet*10)},${Math.round(12+c.wet*35)},${alpha})`;
    ctx.font=`${c.fStyle}${c.fSize}px 'EB Garamond', serif`;
    ctx.fillText(c.ch, c.x+c.sx*Math.min(c.wet,1), c.y+c.sy*Math.min(c.wet,1));
    ctx.restore();
  });
  drops=drops.filter(d=>{ const a=d.update(); if(a) d.draw(); return a; });
  if(drops.length>100) drops.splice(0,drops.length-100);
  chars.forEach(c=>{ if(c.wet>0){c.wet=Math.max(0,c.wet-.0006); c.sx*=.999; c.sy*=.999;} });
  requestAnimationFrame(render);
}

document.fonts.ready.then(()=>{ resize(); render(); });
window.addEventListener('resize', resize);
</script>
</body>
</html>
